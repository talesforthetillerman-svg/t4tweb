<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; padding: 20px; }
    .test-container { 
      width: 100vw; 
      height: 100vh; 
      position: relative;
      background: #f0f0f0;
      border: 2px solid #ccc;
    }
    .hero-section {
      position: relative;
      width: 100%;
      height: 100vh;
      background: black;
      overflow: hidden;
    }
    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      min-height: 100vh;
      width: 100%;
      flex-direction: column;
      justify-content: center;
    }
    .text-center {
      text-align: center;
    }
    .w-fit { width: fit-content; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .block { display: block; }
    .mb-6 { margin-bottom: 1.5rem; }
    
    /* Title styles */
    .title {
      font-size: 3rem; /* text-3xl ~ 3rem */
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.025em;
      color: white;
    }
    
    /* Subtitle styles */
    .subtitle {
      font-size: 10px; /* text-[10px] */
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: -0.025em;
      color: white;
    }
    
    /* Media queries */
    @media (min-width: 640px) {
      .title { font-size: 3.75rem; } /* sm:text-4xl */
      .subtitle { font-size: 12px; } /* sm:text-xs */
    }
    @media (min-width: 768px) {
      .title { font-size: 4.5rem; } /* md:text-5xl */
    }
    @media (min-width: 1024px) {
      .title { font-size: 3.9rem; } /* lg:text-[3.9rem] */
    }
    
    .measure-box {
      position: absolute;
      border: 2px dashed red;
      background: rgba(255, 0, 0, 0.1);
      pointer-events: none;
      z-index: 1000;
    }
    
    .coordinate {
      position: absolute;
      background: white;
      padding: 2px 4px;
      font-size: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Test de Geometría Hero Title vs Subtitle</h1>
  
  <div class="test-container">
    <div class="hero-section">
      <div class="content-wrapper">
        <div class="text-center">
          <h1 class="title block w-fit mx-auto mb-6" id="test-title">
            TALES FOR THE TILLERMAN
          </h1>
          <p class="subtitle block w-fit mx-auto mb-6" id="test-subtitle">
            LIVE MUSIC EXPERIENCE
          </p>
        </div>
      </div>
    </div>
  </div>
  
  <div style="margin-top: 20px;">
    <button onclick="measure()">Medir Geometría</button>
    <button onclick="applyTransform()">Aplicar Transform (simulando editor)</button>
    <div id="results" style="margin-top: 20px; font-family: monospace;"></div>
  </div>
  
  <script>
    function measure() {
      const title = document.getElementById('test-title');
      const subtitle = document.getElementById('test-subtitle');
      
      const titleRect = title.getBoundingClientRect();
      const subtitleRect = subtitle.getBoundingClientRect();
      
      const titleStyle = window.getComputedStyle(title);
      const subtitleStyle = window.getComputedStyle(subtitle);
      
      const results = `
        <h3>Mediciones REALES:</h3>
        <strong>HERO-TITLE:</strong><br>
        - BoundingRect: x=${Math.round(titleRect.x)}, y=${Math.round(titleRect.y)}, width=${Math.round(titleRect.width)}, height=${Math.round(titleRect.height)}<br>
        - Computed: width=${titleStyle.width}, height=${titleStyle.height}<br>
        - Margin: left=${titleStyle.marginLeft}, right=${titleStyle.marginRight}<br>
        - TextAlign: ${titleStyle.textAlign}<br>
        - Display: ${titleStyle.display}<br><br>
        
        <strong>HERO-SUBTITLE:</strong><br>
        - BoundingRect: x=${Math.round(subtitleRect.x)}, y=${Math.round(subtitleRect.y)}, width=${Math.round(subtitleRect.width)}, height=${Math.round(subtitleRect.height)}<br>
        - Computed: width=${subtitleStyle.width}, height=${subtitleStyle.height}<br>
        - Margin: left=${subtitleStyle.marginLeft}, right=${subtitleStyle.marginRight}<br>
        - TextAlign: ${subtitleStyle.textAlign}<br>
        - Display: ${subtitleStyle.display}<br><br>
        
        <strong>DIFERENCIA (title - subtitle):</strong><br>
        - Δx: ${Math.round(titleRect.x - subtitleRect.x)}px<br>
        - Δy: ${Math.round(titleRect.y - subtitleRect.y)}px<br>
        - Δwidth: ${Math.round(titleRect.width - subtitleRect.width)}px<br>
        - Δheight: ${Math.round(titleRect.height - subtitleRect.height)}px<br>
      `;
      
      document.getElementById('results').innerHTML = results;
      
      // Dibujar cajas de medición
      drawBox(titleRect, 'title');
      drawBox(subtitleRect, 'subtitle');
    }
    
    function drawBox(rect, label) {
      // Eliminar cajas anteriores
      const oldBox = document.querySelector(`.measure-box[data-label="${label}"]`);
      const oldCoord = document.querySelector(`.coordinate[data-label="${label}"]`);
      if (oldBox) oldBox.remove();
      if (oldCoord) oldCoord.remove();
      
      // Crear caja
      const box = document.createElement('div');
      box.className = 'measure-box';
      box.dataset.label = label;
      box.style.left = `${rect.x}px`;
      box.style.top = `${rect.y}px`;
      box.style.width = `${rect.width}px`;
      box.style.height = `${rect.height}px`;
      document.querySelector('.test-container').appendChild(box);
      
      // Crear coordenadas
      const coord = document.createElement('div');
      coord.className = 'coordinate';
      coord.dataset.label = label;
      coord.style.left = `${rect.x}px`;
      coord.style.top = `${rect.y - 20}px`;
      coord.textContent = `${label}: ${Math.round(rect.x)},${Math.round(rect.y)}`;
      document.querySelector('.test-container').appendChild(coord);
    }
    
    function applyTransform() {
      const title = document.getElementById('test-title');
      const subtitle = document.getElementById('test-subtitle');
      
      // Aplicar transform similar a la del editor
      title.style.transform = 'translate(69px, 220px) scale(0.856)';
      title.style.transformOrigin = 'top left';
      
      subtitle.style.transform = 'translate(-376px, 342px) scale(2.51)';
      subtitle.style.transformOrigin = 'top left';
      
      setTimeout(measure, 100);
    }
    
    // Medir al cargar
    window.addEventListener('load', () => {
      setTimeout(measure, 500);
    });
  </script>
</body>
</html>
